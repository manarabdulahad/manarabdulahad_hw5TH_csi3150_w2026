<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Used Car Finder</title>
    
    <link rel="stylesheet" href="css/style.css">

    <script src="js/usedCars-TH-1-2.js"></script>
    <script src="js/main.js" defer></script>
</head>
<body>
    <header>
        <h1>Used Car Finder</h1>
        <p>Browse our dealership inventory</p>
    </header>

    <section class="filters">
        <h2>Search Inventory</h2>
        <div class="filter-grid">
            <div>
                <label for="minYear">Min Year</label>
                <input type="number" id="minYear">
            </div>
            <div>
                <label for="maxYear">Max Year</label>
                <input type="number" id="maxYear">
            </div>
            <div>
                <label for="maxMileage">Max Mileage</label>
                <input type="number" id="maxMileage">
            </div>
            <div>
                <label for="maxPrice">Max Price</label>
                <input type="number" id="maxPrice">
            </div>
            <div>
                <label for="make">Make</label>
                <select id="make">
                    <option value="">Any</option>
                    <option value="Toyota">Toyota</option>
                    <option value="Honda">Honda</option>
                    <option value="Ford">Ford</option>
                    <option value="Nissan">Nissan</option>
                    <option value="Tesla">Tesla</option>
                    <option value="BMW">BMW</option>
                    <option value="Chevrolet">Chevrolet</option>
                    <option value="Volkswagen">Volkswagen</option>
                </select>
            </div>
            <div>
                <label for="color">Color</label>
                <select id="color">
                    <option value="">Any</option>
                    <option value="Silver">Silver</option>
                    <option value="White">White</option>
                    <option value="Black">Black</option>
                    <option value="Blue">Blue</option>
                    <option value="Red">Red</option>
                </select>
            </div>
        </div>
        <button onclick="filterCars()">Search Cars</button>
    </section>

    <main>
        <p id="noResults"></p>
        <div id="carContainer"></div>
    </main>

    <footer>
        <p>CSI 3150 – Used Car Interface [cite: 26]</p>
    </footer>
</body>
</html>
